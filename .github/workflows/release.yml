name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # ── KDE Store tarball ──────────────────────────────────────────────
      - name: Build KDE Store tarball
        run: |
          chmod +x packaging/make-release.sh
          ./packaging/make-release.sh "$VERSION"

      # ── .deb ──────────────────────────────────────────────────────────
      - name: Install Debian build tools
        run: sudo apt-get install -y debhelper devscripts build-essential

      - name: Build .deb
        run: |
          sed -i "s/^ii-material-sddm (.*/ii-material-sddm ($VERSION-1) unstable; urgency=medium/" packaging/debian/changelog
          cp -r packaging/debian debian
          dpkg-buildpackage -us -uc -b
          mv ../ii-material-sddm_*.deb .

      # ── .rpm ──────────────────────────────────────────────────────────
      - name: Install RPM build tools
        run: sudo apt-get install -y rpm

      - name: Build .rpm
        run: |
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          tar -czf ~/rpmbuild/SOURCES/ii-material-sddm-$VERSION.tar.gz \
            --transform "s|^\.|ii-material-sddm-$VERSION|" \
            --exclude=".git" --exclude="packaging" .
          sed "s/^Version:.*/Version: $VERSION/" packaging/fedora/ii-material-sddm.spec \
            > ~/rpmbuild/SPECS/ii-material-sddm.spec
          rpmbuild -bb ~/rpmbuild/SPECS/ii-material-sddm.spec
          find ~/rpmbuild/RPMS -name "*.rpm" -exec mv {} . \;

      # ── GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ env.VERSION }}"
          body: |
            ## ii-material-sddm v${{ env.VERSION }}

            ### Installation

            | Method | File |
            |--------|------|
            | KDE Store / Manual | `ii-material-sddm-${{ env.VERSION }}.tar.gz` |
            | Debian / Ubuntu | `ii-material-sddm_${{ env.VERSION }}-1_all.deb` |
            | Fedora / RHEL | `ii-material-sddm-${{ env.VERSION }}-1.noarch.rpm` |
            | Arch Linux | `yay -S ii-material-sddm` |

            See [README](https://github.com/ToRvaLDz/ii-material-sddm#installation) for full instructions.
          files: |
            ii-material-sddm-${{ env.VERSION }}.tar.gz
            ii-material-sddm_*.deb
            *.noarch.rpm

  aur:
    name: Update AUR
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install makepkg dependencies
        run: sudo apt-get install -y libarchive-tools

      - name: Compute sha256 of release tarball
        run: |
          URL="https://github.com/ToRvaLDz/ii-material-sddm/releases/download/v${VERSION}/ii-material-sddm-${VERSION}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV

      - name: Set up SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur_rsa
          chmod 600 ~/.ssh/aur_rsa
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur_rsa
            StrictHostKeyChecking no
          EOF

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/ii-material-sddm.git ~/aur-pkg

      - name: Update PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD
          sed -i "s/'PLACEHOLDER'/'$SHA256'/" packaging/aur/PKGBUILD
          cp packaging/aur/PKGBUILD ~/aur-pkg/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cd ~/aur-pkg
          # Installa makepkg via pacman in docker non disponibile su ubuntu,
          # genera .SRCINFO manualmente dal PKGBUILD
          python3 - <<'EOF'
          import re, sys

          with open("PKGBUILD") as f:
              content = f.read()

          def get(key):
              m = re.search(rf"^{key}=(.+)", content, re.M)
              return m.group(1).strip().strip("'\"") if m else ""

          def get_array(key):
              m = re.search(rf"^{key}=\(([^)]+)\)", content, re.M | re.S)
              if not m: return []
              return [x.strip().strip("'\"") for x in re.split(r'\s+', m.group(1).strip()) if x.strip()]

          lines = [
              f"pkgbase = {get('pkgname')}",
              f"\tpkgdesc = {get('pkgdesc')}",
              f"\tpkgver = {get('pkgver')}",
              f"\tpkgrel = {get('pkgrel')}",
              f"\turl = {get('url')}",
              f"\tarch = {get('arch').strip('()')}",
              f"\tlicense = {get('license').strip('()')}",
          ]
          for d in get_array("depends"):
              lines.append(f"\tdepends = {d}")
          for d in get_array("optdepends"):
              lines.append(f"\toptdepends = {d}")
          for p in get_array("provides"):
              lines.append(f"\tprovides = {p}")
          for c in get_array("conflicts"):
              lines.append(f"\tconflicts = {c}")
          for s in get_array("source"):
              lines.append(f"\tsource = {s}")
          for h in get_array("sha256sums"):
              lines.append(f"\tsha256sums = {h}")
          lines.append("")
          lines.append(f"pkgname = {get('pkgname')}")
          lines.append("")

          with open(".SRCINFO", "w") as f:
              f.write("\n".join(lines))
          print("SRCINFO generato")
          EOF

      - name: Commit and push to AUR
        run: |
          cd ~/aur-pkg
          git config user.name "Marco Migozzi"
          git config user.email "github-actions@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "upgpkg: ii-material-sddm $VERSION"
          git push origin master
